<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column; /* Allows stacking form and results */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        form {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }

        h3 {
            margin: 15px 0 8px 0;
            font-size: 16px;
            color: #333;
        }

        input[type="text"], select {
            width: 100%;
            padding: 10px;
            margin-bottom: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            text-align: center;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* Container for the calculated results */
        #resultContainer {
            margin-top: 20px;
            padding: 20px;
            background-color: #e9ecef;
            border-left: 5px solid #28a745;
            border-radius: 4px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
            display: none; /* Hidden by default */
        }
    </style>
</head>
<body>

    <!-- Removed action and method from form tag to handle it in JS -->
    <form method="POST" action="./calculator" >
        <h3>Loan Amount</h3>
        <input type="text" name="LoanAmount" placeholder="Enter amount" required/>
        
        <h3>Interest %</h3>
        <input type="text" name="Interest" placeholder="Enter interest rate" required/>
        
        <h3>No of Installment per Year</h3>
        <select name="NoOfInstallmentPerYear" required>
            <option disabled selected value="">Select month</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
            <option>6</option>
            <option>7</option>
            <option>8</option>
            <option>9</option>
            <option>10</option>
            <option>11</option>
            <option>12</option>
        </select>
        
        <h3>Total Number of Installments</h3>
        <input type="text" name="TotalInstallments" placeholder="Enter total installments" required/>
        
        <button type="submit">Submit</button>
    </form>

</body>
</html>
